<svg width="1000" height="260" viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080810"/>
      <stop offset="100%" stop-color="#0e0e1a"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4dd0e1" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4dd0e1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#edf2f8"/>
      <stop offset="100%" stop-color="#c8d4e0"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="260" fill="url(#bg)"/>
  <circle cx="150" cy="60" r="220" fill="url(#glowCyan)"/>
  <circle cx="880" cy="210" r="220" fill="url(#glowPurple)"/>

  <!-- fine dot grid, subtle -->
  <g opacity="0.05">
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#c8d4e0"/>
    </pattern>
    <rect width="1000" height="260" fill="url(#dots)"/>
  </g>

  <text x="60" y="88" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="15" fill="#4dd0e1" letter-spacing="1">// hallo welt</text>

  <text x="58" y="140" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="46" font-weight="600" fill="url(#titleGrad)">Stefan Rautner</text>

  <text x="60" y="178" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="19" fill="#a78bfa" font-weight="500">Vom Code zur Realität — Smart, Sicher, Automatisiert.</text>

  <text x="60" y="212" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#586274">Smart Home Systems · Security Tools · Automation — Kuchl, Salzburg AT</text>

  <line x1="60" y1="228" x2="940" y2="228" stroke="#4dd0e1" stroke-opacity="0.18" stroke-width="1"/>
</svg>
